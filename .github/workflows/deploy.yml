name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t myapp .

      # Step 5: Tag Image
      - name: Tag Image
        run: |
          docker tag myapp:latest 238395401573.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest

      # Step 6: Push Image
      - name: Push Image
        run: |
          docker push 238395401573.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest

      # Step 7: Deploy to EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo ./deploy.sh