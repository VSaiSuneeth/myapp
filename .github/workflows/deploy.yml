name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Step 1: Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS Credentials (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::238395401573:role/github-actions-ecr-push
          aws-region: ap-south-1

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t myapp .

      # Step 5: Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag myapp:latest 238395401573.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest

      # Step 6: Push Docker Image to ECR
      - name: Push Docker Image
        run: |
          docker push 238395401573.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest

      # Step 7: Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo ./deploy.sh