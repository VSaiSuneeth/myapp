name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-south-1
  ACCOUNT_ID: 238395401573
  IMAGE_NAME: myapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::238395401573:role/github-actions-ecr-push
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -t $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:${{ github.sha }}

      - name: Verify Signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/VSaiSuneeth/myapp/.github/workflows/deploy.yml@refs/heads/main" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:${{ github.sha }}

      - name: Get Image Digest
        id: digest
        run: |
          DIGEST=$(aws ECR describe-images \
            --repository-name $IMAGE_NAME \
            --region $AWS_REGION \
            --image-ids imageTag=${{ github.sha }} \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Load SSH Key (Runs before checkout so the key persists)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITOPS_DEPLOY_KEY }}

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: VSaiSuneeth/myapp-gitops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          path: gitops

      - name: Verify GitOps Remote Connection
        run: |
          cd gitops
          git remote -v
          ssh -T git@github.com || true

      - name: Update Helm Values
        run: |
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME@${{ steps.digest.outputs.digest }}"
          sed -i "s|repository:.*|repository: $IMAGE|g" gitops/myapp-chart/values.yaml
          sed -i "s|tag:.*|tag: \"\"|g" gitops/myapp-chart/values.yaml

      - name: Commit Changes
        run: |
          cd gitops
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add myapp-chart/values.yaml
          git diff --cached --quiet || git commit -m "Update image tag to ${{ github.sha }}"

      - name: Push GitOps Repository
        run: |
          cd gitops
          git push origin main