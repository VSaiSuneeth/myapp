apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp
  labels:
    app: myapp

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 8 }}

      containers:
        - name: myapp
          {{- if .Values.image.tag }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- else }}
          image: "{{ .Values.image.repository }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080